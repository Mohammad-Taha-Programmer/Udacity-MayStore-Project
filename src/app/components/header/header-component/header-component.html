
<header class="header">
      <div class="header-content">
        <a routerLink="/" class="logo">My Store</a>
        <nav class="nav">
          <a routerLink="/" class="nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Shop</a>
          
          <a routerLink="/cart" class="cart-btn">
            <span class="cart-icon">&#128722;</span>
            <span>Cart</span>
            @if (cartService.cartCount() > 0) {
              <span class="cart-badge">{{ cartService.cartCount() }}</span>
            }
        </a>

        </nav>
      </div>
</header>
